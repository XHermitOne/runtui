name: Publish to PyPI

on:
  release:
    types: [published]

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        
    - name: Install build & twine
      run: python -m pip install --upgrade build twine
      
    - name: Build
      run: python -m build
      
    - name: Publish
      # 1. Define the variables here. GitHub handles them securely.
      env:
        TWINE_USERNAME: __token__
        TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
      # 2. Run twine without arguments. It will automatically read the env vars above.
      run: python -m twine upload dist/*
